<!-- Flappy Bird v8 — Samsung S25 Edge Optimised -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
<title>Flappy Bird v8 — Pokémon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #app {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
  }

  #canvasWrapper {
    position: relative;
    flex: 1 1 auto;
    width: 100%;
    overflow: hidden;
  }

  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  /* ---------- UI overlay (safe-area aware) ---------- */
  #uiOverlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    pointer-events: none;
    padding-top: max(48px, env(safe-area-inset-top));
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  #hud {
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
    padding: 6px 14px;
    pointer-events: none;
  }

  #scoreDisplay {
    position: absolute;
    left: 0; right: 0;
    top: 4px;
    text-align: center;
    font-size: 40px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 6px rgba(0,0,0,0.6), 2px 2px 0 #5a3b12, -1px -1px 0 #5a3b12;
    letter-spacing: 1px;
    pointer-events: none;
    display: none;
  }

  #hudButtons {
    display: flex;
    gap: 10px;
    pointer-events: auto;
    z-index: 5;
  }

  .iconBtn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: rgba(10,10,10,0.45);
    border: 2px solid rgba(255,255,255,0.55);
    color: #fff;
    font-size: 19px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    pointer-events: auto;
    backdrop-filter: blur(2px);
  }
  .iconBtn:active { transform: scale(0.92); }

  /* ---------- Generic centered overlay panel ---------- */
  .overlayPanel {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.55);
    pointer-events: auto;
    gap: 22px;
  }
  .overlayPanel.hidden { display: none; }

  .panelLabel {
    font-size: 34px;
    font-weight: 900;
    color: #fff9e0;
    letter-spacing: 3px;
    text-shadow: 3px 3px 0 #5a3b12, 0 0 12px rgba(0,0,0,0.5);
  }

  .bigBtn, .smallBtn {
    font-family: inherit;
    font-weight: 900;
    letter-spacing: 1px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    color: #5a3b12;
    background: linear-gradient(#ffe27a, #ffb02e);
    box-shadow: 0 5px 0 #b3721a, 0 8px 14px rgba(0,0,0,0.35);
    padding: 16px 34px;
    font-size: 19px;
  }
  .bigBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b3721a; }

  .smallBtn {
    background: linear-gradient(#eaeaea, #c9c9c9);
    box-shadow: 0 4px 0 #8a8a8a, 0 6px 10px rgba(0,0,0,0.3);
    padding: 10px 26px;
    font-size: 14px;
  }
  .smallBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #8a8a8a; }

  /* ---------- Game Over slide-down panel ---------- */
  .slidePanel {
    position: absolute;
    top: 8%;
    left: 50%;
    width: min(86%, 360px);
    transform: translate(-50%, -140%);
    background: linear-gradient(#fff6dd, #ffe6ad);
    border: 4px solid #8a5a2c;
    border-radius: 20px;
    padding: 22px 20px 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.45);
    transition: transform 0.5s cubic-bezier(.2,.9,.3,1.2);
    pointer-events: auto;
  }
  .slidePanel.hidden { display: none; }
  .slidePanel.show { transform: translate(-50%, 0%); }

  .slidePanel .panelLabel { color: #7a3b12; text-shadow: 2px 2px 0 rgba(255,255,255,0.5); font-size: 26px; }

  #medalCanvas { width: 80px; height: 80px; }
  #medalLabel {
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 2px;
    color: #8a5a2c;
    margin-top: -6px;
  }

  .statsGrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 18px;
    width: 100%;
    margin: 4px 0;
  }
  .statBox {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(255,255,255,0.5);
    border-radius: 10px;
    padding: 6px 4px;
  }
  .statValue { font-size: 20px; font-weight: 900; color: #5a3b12; }
  .statName { font-size: 10px; font-weight: 700; color: #8a6a3c; letter-spacing: 1px; }

  /* ---------- Landscape lock overlay ---------- */
  #landscapeOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    color: #fff;
    z-index: 9999;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.5;
  }



  /* ---------- Bird select (start screen) ---------- */
  #birdSelect {
    position: absolute;
    left: 0; right: 0;
    bottom: max(10px, env(safe-area-inset-bottom));
    padding: 0 10px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
    z-index: 4;
  }
  #birdSelect.hidden { display: none; }
  #birdSelectLabel {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 2px;
    color: #5a3b12;
    text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    background: rgba(255,246,221,0.9);
    padding: 4px 12px;
    border-radius: 999px;
  }
  #birdDescCard {
    width: min(100%, 360px);
    background: rgba(255,248,232,0.95);
    border: 2px solid #8a5a2c;
    border-radius: 14px;
    padding: 8px 10px 10px;
    pointer-events: auto;
    box-shadow: 0 6px 16px rgba(0,0,0,0.2);
  }
  #birdDescTitle {
    font-size: 13px;
    font-weight: 900;
    color: #7a3b12;
    margin-bottom: 4px;
  }
  #birdDescUnlock {
    font-size: 10px;
    font-weight: 800;
    color: #8a6a3c;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  #birdDescUnlock.locked { color: #a33; }
  #birdDescUnlock.unlocked { color: #2f6b2f; }
  #birdDescText {
    font-size: 11px;
    font-weight: 600;
    color: #5a3b12;
    line-height: 1.35;
    max-height: 58px;
    overflow-y: auto;
  }
  #birdGrid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    width: min(100%, 360px);
    pointer-events: auto;
  }
  .birdOption {
    appearance: none;
    border: 2px solid rgba(90,59,18,0.35);
    background: rgba(255,255,255,0.9);
    border-radius: 12px;
    padding: 4px 2px 3px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    position: relative;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    min-height: 62px;
  }
  .birdOption img {
    width: 42px;
    height: 42px;
    object-fit: contain;
    pointer-events: none;
  }
  .birdOption span {
    font-size: 8px;
    font-weight: 900;
    letter-spacing: 0;
    color: #5a3b12;
    text-align: center;
    line-height: 1.05;
    max-width: 100%;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .birdOption.selected {
    border-color: #ffb02e;
    background: linear-gradient(#fff6dd, #ffe27a);
    box-shadow: 0 0 0 2px rgba(255,176,46,0.45), 0 4px 10px rgba(0,0,0,0.22);
    transform: translateY(-1px);
  }
  .birdOption.locked:not(.masked) {
    opacity: 0.72;
    filter: grayscale(0.35);
  }
  .birdOption.masked {
    opacity: 0.95;
  }
  .birdOption.masked img {
    filter: brightness(0) !important;
    opacity: 0.88;
  }
  .birdOption.masked > span {
    visibility: hidden;
    height: 0;
    overflow: hidden;
  }
  .birdOption.masked::after {
    content: '???';
    position: absolute;
    left: 2px; right: 2px; bottom: 4px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 9px;
    font-weight: 900;
    border-radius: 6px;
    padding: 1px 3px;
    text-align: center;
    pointer-events: none;
  }
  .birdOption.locked::after {
    content: attr(data-lock);
    position: absolute;
    inset: auto 2px 18px 2px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 8px;
    font-weight: 900;
    border-radius: 6px;
    padding: 1px 3px;
    text-align: center;
    pointer-events: none;
  }
  .birdOption:active { transform: scale(0.96); }

  #difficultySelect {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    width: min(100%, 360px);
    pointer-events: auto;
  }
  .diffBtn {
    appearance: none;
    border: 2px solid rgba(90,59,18,0.35);
    background: rgba(255,255,255,0.9);
    border-radius: 10px;
    padding: 7px 6px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 900;
    color: #5a3b12;
    letter-spacing: 0.2px;
    cursor: pointer;
    box-shadow: 0 3px 8px rgba(0,0,0,0.12);
    text-align: center;
  }
  .diffBtn.selected {
    border-color: #ffb02e;
    background: linear-gradient(#fff6dd, #ffe27a);
    box-shadow: 0 0 0 2px rgba(255,176,46,0.4), 0 4px 10px rgba(0,0,0,0.18);
  }
  .diffBtn[data-diff="idiot"].selected {
    border-color: #43a047;
    background: linear-gradient(#e8ffe8, #b9f6ca);
    box-shadow: 0 0 0 2px rgba(67,160,71,0.35), 0 4px 10px rgba(0,0,0,0.18);
    color: #1b5e20;
  }
  .diffBtn[data-diff="expert"].selected {
    border-color: #ef6c00;
    background: linear-gradient(#fff3e0, #ffcc80);
    box-shadow: 0 0 0 2px rgba(239,108,0,0.35), 0 4px 10px rgba(0,0,0,0.18);
    color: #e65100;
  }
  .diffBtn[data-diff="india"].selected {
    border-color: #c62828;
    background: linear-gradient(#ffe0e0, #ffb3b3);
    box-shadow: 0 0 0 2px rgba(198,40,40,0.35), 0 4px 10px rgba(0,0,0,0.18);
    color: #7a1010;
  }
  .diffBtn:active { transform: scale(0.97); }
  #difficultySelect .diffBtn[data-diff="india"] {
    grid-column: 1 / -1;
  }

  #unlockProgress {
    font-size: 10px;
    font-weight: 800;
    color: #5a3b12;
    background: rgba(255,246,221,0.88);
    padding: 3px 10px;
    border-radius: 999px;
  }

  @media (orientation: landscape) {
    #app { display: none; }
    #landscapeOverlay { display: flex; }
  }
</style>
</head>
<body>

  <div id="app">
    <div id="canvasWrapper">
      <canvas id="gameCanvas"></canvas>

      <div id="uiOverlay">
        <div id="scoreDisplay">0</div>
        <div id="hud">
          <div id="hudButtons">
            <button id="muteBtn" class="iconBtn" type="button">🔊</button>
            <button id="pauseBtn" class="iconBtn" type="button">⏸</button>
          </div>
        </div>


                        <div id="birdSelect">
          <div id="birdSelectLabel">CHOOSE A POKÉMON</div>
          <div id="difficultySelect">

            <button type="button" class="diffBtn" data-diff="india">Difficulty: India</button>

function getDifficulty() {
  return DIFFICULTIES.find((d) => d.id === selectedDifficultyId) || DIFFICULTIES.find((d) => d.id === 'beginner') || DIFFICULTIES[1];
}

function applyDifficultySelection(id) {
  if (!DIFFICULTIES.some((d) => d.id === id)) return;
  selectedDifficultyId = id;
  memory.difficulty = id;
  saveMemory();
  document.querySelectorAll('.diffBtn').forEach((btn) => {
    btn.classList.toggle('selected', btn.getAttribute('data-diff') === id);
  });
  refreshBirdOptionLocks();
  updateBirdDescUI(inspectedBirdId || selectedBirdId || 'pikachu');
}

function syncDifficultyUI() {
  const id = memory.difficulty || selectedDifficultyId || 'beginner';
  applyDifficultySelection(DIFFICULTIES.some((d) => d.id === id) ? id : 'beginner');
}

  { name: 'platinum', threshold: 50, color1: '#eef2fb', color2: '#9fb0c9' },

function getMedalForScore(score) {
  for (const m of MEDALS) { if (score >= m.threshold) return m; }
  return null;
}

function medalRank(name) {
  const order = ['bronze', 'silver', 'gold', 'platinum'];
  return order.indexOf(name);
}

function loadMemory() {
  try {
    memory.highScore = parseInt(localStorage.getItem(STORAGE_PREFIX + 'highScore'), 10) || 0;
    try {
      const hs = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'highScores') || 'null');
      memory.highScores = Object.assign({ idiot: 0, beginner: 0, skilled: 0, expert: 0, india: 0 }, hs || {});
    } catch (_) {
      memory.highScores = { idiot: 0, beginner: 0, skilled: 0, expert: 0, india: 0 };
    }
    // Migrate legacy single highScore into beginner if needed
    if ((memory.highScores.beginner || 0) < (memory.highScore || 0)) {
      memory.highScores.beginner = memory.highScore || 0;
    }
    memory.bestMedal = localStorage.getItem(STORAGE_PREFIX + 'bestMedal') || null;
    memory.totalGames = parseInt(localStorage.getItem(STORAGE_PREFIX + 'totalGames'), 10) || 0;
    memory.totalScore = parseInt(localStorage.getItem(STORAGE_PREFIX + 'totalScore'), 10) || 0;
    memory.muted = localStorage.getItem(STORAGE_PREFIX + 'muted') === 'true';
    const savedBird = localStorage.getItem(STORAGE_PREFIX + 'selectedBird');
    memory.selectedBird = (savedBird && BIRD_IMAGES[savedBird]) ? savedBird : 'pikachu';
    const savedDiff = localStorage.getItem(STORAGE_PREFIX + 'difficulty');
    memory.difficulty = (savedDiff && ['idiot','beginner','skilled','expert','india'].includes(savedDiff)) ? savedDiff : 'beginner';
  } catch (e) {
    // localStorage unavailable (private mode, disabled, etc.) — fail silently with defaults
    console.warn('flappyBird: loadMemory failed', e);
  }
}

function saveMemory() {
  try {
    localStorage.setItem(STORAGE_PREFIX + 'highScore', String(memory.highScore));
    localStorage.setItem(STORAGE_PREFIX + 'highScores', JSON.stringify(memory.highScores || {}));
    if (memory.bestMedal) localStorage.setItem(STORAGE_PREFIX + 'bestMedal', memory.bestMedal);
    localStorage.setItem(STORAGE_PREFIX + 'totalGames', String(memory.totalGames));
    localStorage.setItem(STORAGE_PREFIX + 'totalScore', String(memory.totalScore));
    localStorage.setItem(STORAGE_PREFIX + 'muted', String(memory.muted));
    localStorage.setItem(STORAGE_PREFIX + 'selectedBird', String(memory.selectedBird || selectedBirdId || 'pikachu'));
    localStorage.setItem(STORAGE_PREFIX + 'difficulty', String(memory.difficulty || selectedDifficultyId || 'beginner'));
  } catch (e) {
    console.warn('flappyBird: saveMemory failed', e);
  }
}

/* =====================================================================
   SECTION: Canvas Setup (device-pixel-ratio aware, CRITICAL per spec)
   ===================================================================== */
const canvasWrapper = document.getElementById('canvasWrapper');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let cssWidth = 0;
let cssHeight = 0;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvasWrapper.getBoundingClientRect();
  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(rect.height * dpr);
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(dpr, dpr);
  // All game logic below uses these CSS-pixel dimensions, never canvas.width/height directly.
  cssWidth = rect.width;
  cssHeight = rect.height;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

/* =====================================================================
   SECTION: Bird
   ===================================================================== */
const bird = {
  x: 0, y: 0, vy: 0, rotation: 0, alive: true,
};

function resetBird() {
  bird.x = cssWidth * CONFIG.BIRD_X_RATIO;
  bird.y = cssHeight * 0.4;
  bird.vy = 0;
  bird.rotation = 0;
  bird.alive = true;
}

// Draw the currently selected bird sprite (images embedded as data URIs).
// flapAngle gently bobs/scales the wing feel for sprite birds.
function drawBird(ctxRef, x, y, size, flapAngle) {
  const img = BIRD_IMAGES[selectedBirdId] || BIRD_IMAGES.pikachu;
  const bob = Math.sin(flapAngle) * (size * 0.04);
  const squash = 1 + Math.sin(flapAngle) * 0.06;
  const w = size * 1.15;
  const h = size * squash;
  ctxRef.save();
  ctxRef.translate(x, y + bob);
  if (img && img.complete && img.naturalWidth > 0) {
    ctxRef.drawImage(img, -w / 2, -h / 2, w, h);
  } else {
    // fallback oval while image loads
    ctxRef.fillStyle = '#222';
    ctxRef.beginPath();
    ctxRef.ellipse(0, 0, size * 0.4, size * 0.35, 0, 0, Math.PI * 2);
    ctxRef.fill();
  }
  ctxRef.restore();
}

function updateBird(dt) {
  const factor = dt / CONFIG.FRAME_MS;
  bird.vy += getDifficulty().GRAVITY * factor;
  bird.y += bird.vy * factor;
  const targetRotation = clamp(bird.vy * 3, -30, 90) * Math.PI / 180;
  bird.rotation += (targetRotation - bird.rotation) * Math.min(1, 0.2 * factor);
}

function jump() {
  bird.vy = getDifficulty().JUMP_VELOCITY;
  spawnDustPuff();
  playFlapSound();
}

/* =====================================================================
   SECTION: Pipes
   ===================================================================== */
let pipes = [];
let pipeSpawnTimer = 0;
let currentPipeSpeed = getDifficulty().PIPE_SPEED_BASE;
let currentGap = getDifficulty().PIPE_GAP_BASE;

function resetPipes() {
  pipes = [];
  pipeSpawnTimer = 0;
  const d = getDifficulty();
  currentPipeSpeed = d.PIPE_SPEED_BASE;
  currentGap = d.PIPE_GAP_BASE;
}

function updatePipeDifficulty(score) {
  const d = getDifficulty();
  currentPipeSpeed = Math.min(d.PIPE_SPEED_MAX, d.PIPE_SPEED_BASE + score * d.PIPE_SPEED_INC);
  const shrinkSteps = Math.floor(score / d.PIPE_GAP_SHRINK_EVERY);
  currentGap = Math.max(d.PIPE_GAP_MIN, d.PIPE_GAP_BASE - shrinkSteps * d.PIPE_GAP_SHRINK_AMOUNT);
}

function spawnPipe() {
  const margin = 60;
  const minY = margin + currentGap / 2;
  const maxY = (cssHeight - CONFIG.GROUND_HEIGHT) - margin - currentGap / 2;
  const gapY = maxY > minY ? (minY + Math.random() * (maxY - minY)) : (cssHeight - CONFIG.GROUND_HEIGHT) / 2;
  pipes.push({ x: cssWidth + CONFIG.PIPE_WIDTH, gapY, gapHeight: currentGap, passed: false });
}

function updatePipes(dt, factor) {
  pipeSpawnTimer += dt;
  if (pipeSpawnTimer >= getDifficulty().PIPE_SPAWN_INTERVAL) {
    pipeSpawnTimer = 0;
    spawnPipe();
  }
  for (const p of pipes) p.x -= currentPipeSpeed * factor;
  pipes = pipes.filter((p) => p.x > -CONFIG.PIPE_WIDTH - 10);
}

function roundRectFill(ctxRef, x, y, w, h, r) {
  if (h <= 0 || w <= 0) return;
  ctxRef.beginPath();
  ctxRef.moveTo(x + r, y);
  ctxRef.lineTo(x + w - r, y);
  ctxRef.quadraticCurveTo(x + w, y, x + w, y + r);
  ctxRef.lineTo(x + w, y + h - r);
  ctxRef.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctxRef.lineTo(x + r, y + h);
  ctxRef.quadraticCurveTo(x, y + h, x, y + h - r);
  ctxRef.lineTo(x, y + r);
  ctxRef.quadraticCurveTo(x, y, x + r, y);
  ctxRef.closePath();
  ctxRef.fill();
  ctxRef.stroke();
}

function drawPipe(ctxRef, p) {
  const groundY = cssHeight - CONFIG.GROUND_HEIGHT;
  const w = CONFIG.PIPE_WIDTH;
  const capH = CONFIG.PIPE_CAP_HEIGHT;
  const topH = p.gapY - p.gapHeight / 2;
  const botY = p.gapY + p.gapHeight / 2;

  const grad = ctxRef.createLinearGradient(p.x, 0, p.x + w, 0);
  grad.addColorStop(0, '#2f8f3a');
  grad.addColorStop(0.45, '#7ed957');
  grad.addColorStop(1, '#2f8f3a');
  ctxRef.fillStyle = grad;
  ctxRef.strokeStyle = 'rgba(20,70,20,0.5)';
  ctxRef.lineWidth = 2;

  // top pipe body + cap
  const topBodyH = Math.max(0, topH - capH);
  roundRectFill(ctxRef, p.x, 0, w, topBodyH, 4);
  roundRectFill(ctxRef, p.x - 4, Math.max(0, topH - capH), w + 8, Math.min(capH, topH), 6);

  // bottom pipe body + cap
  const botBodyY = botY + capH;
  const botBodyH = Math.max(0, groundY - botBodyY);
  roundRectFill(ctxRef, p.x, botBodyY, w, botBodyH, 4);
  roundRectFill(ctxRef, p.x - 4, botY, w + 8, Math.min(capH, groundY - botY), 6);
}

function drawPipesAll(ctxRef) {
  for (const p of pipes) drawPipe(ctxRef, p);
}

/* =====================================================================
   SECTION: Background (sky, parallax clouds, ground, vignette)
   ===================================================================== */
const CLOUD_SPEEDS = [0.15, 0.35, 0.6];
const CLOUD_ALPHAS = [0.45, 0.65, 0.9];
const CLOUD_COUNTS = [3, 4, 5];
let clouds = [[], [], []];
let groundOffset = 0;

function initClouds() {
  for (let layer = 0; layer < 3; layer++) {
    clouds[layer] = [];
    for (let i = 0; i < CLOUD_COUNTS[layer]; i++) {
      clouds[layer].push({
        x: Math.random() * Math.max(cssWidth, 1),
        y: 30 + Math.random() * (cssHeight * 0.38),
        scale: 0.55 + Math.random() * 0.75,
      });
    }
  }
}

function updateClouds(factor) {
  for (let layer = 0; layer < 3; layer++) {
    for (const c of clouds[layer]) {
      c.x -= CLOUD_SPEEDS[layer] * factor;
      if (c.x < -60 * c.scale) {
        c.x = cssWidth + 60 * c.scale;
        c.y = 30 + Math.random() * (cssHeight * 0.38);
      }
    }
  }
}

function drawCloud(ctxRef, x, y, scale, alpha) {
  ctxRef.save();
  ctxRef.globalAlpha = alpha;
  ctxRef.fillStyle = '#ffffff';
  ctxRef.beginPath();
  ctxRef.arc(x, y, 14 * scale, 0, Math.PI * 2);
  ctxRef.arc(x + 16 * scale, y - 6 * scale, 18 * scale, 0, Math.PI * 2);
  ctxRef.arc(x + 32 * scale, y, 14 * scale, 0, Math.PI * 2);
  ctxRef.arc(x + 16 * scale, y + 7 * scale, 16 * scale, 0, Math.PI * 2);
  ctxRef.fill();
  ctxRef.restore();
}

function drawClouds(ctxRef) {
  for (let layer = 0; layer < 3; layer++) {
    for (const c of clouds[layer]) drawCloud(ctxRef, c.x, c.y, c.scale, CLOUD_ALPHAS[layer]);
  }
}

function drawSky(ctxRef) {
  const grad = ctxRef.createLinearGradient(0, 0, 0, cssHeight);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(1, '#E0F4FF');
  ctxRef.fillStyle = grad;
  ctxRef.fillRect(0, 0, cssWidth, cssHeight);
}

function currentGroundSpeed() {
  if (gameState === STATE.PLAYING || gameState === STATE.DEAD) return currentPipeSpeed;
  return 1.1;
}

function updateGround(factor) {
  groundOffset -= currentGroundSpeed() * factor;
  const patternWidth = 40;
  if (groundOffset <= -patternWidth) groundOffset += patternWidth;
}

function drawGround(ctxRef) {
  const groundY = cssHeight - CONFIG.GROUND_HEIGHT;
  const dirtGrad = ctxRef.createLinearGradient(0, groundY + 14, 0, cssHeight);
  dirtGrad.addColorStop(0, '#c98a4b');
  dirtGrad.addColorStop(1, '#7c4f26');
  ctxRef.fillStyle = dirtGrad;
  ctxRef.fillRect(0, groundY + 14, cssWidth, CONFIG.GROUND_HEIGHT - 14);

  ctxRef.fillStyle = '#6abf4b';
  ctxRef.fillRect(0, groundY, cssWidth, 16);

  ctxRef.fillStyle = '#5aa83e';
  const bladeW = 20;
  for (let x = groundOffset - bladeW; x < cssWidth + bladeW; x += bladeW) {
    ctxRef.beginPath();
    ctxRef.moveTo(x, groundY + 16);
    ctxRef.lineTo(x + bladeW / 2, groundY + 7);
    ctxRef.lineTo(x + bladeW, groundY + 16);
    ctxRef.closePath();
    ctxRef.fill();
  }

  ctxRef.strokeStyle = 'rgba(0,0,0,0.15)';
  ctxRef.lineWidth = 2;
  ctxRef.beginPath();
  ctxRef.moveTo(0, groundY + 14);
  ctxRef.lineTo(cssWidth, groundY + 14);
  ctxRef.stroke();
}

function drawVignette(ctxRef) {
  const grad = ctxRef.createRadialGradient(
    cssWidth / 2, cssHeight / 2, cssHeight * 0.35,
    cssWidth / 2, cssHeight / 2, cssHeight * 0.78
  );
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctxRef.fillStyle = grad;
  ctxRef.fillRect(0, 0, cssWidth, cssHeight);
}

/* =====================================================================
   SECTION: Particles (dust puffs, feather burst, score pop-ups)
   ===================================================================== */
let particles = [];

function resetParticles() { particles = []; }

function spawnDustPuff() {
  for (let i = 0; i < 4; i++) {
    particles.push({
      type: 'dust',
      x: bird.x - 12, y: bird.y + 8,
      vx: -1 - Math.random() * 1.5, vy: 0.4 + Math.random() * 0.8,
      life: 0, maxLife: 380 + Math.random() * 180,
      size: 3 + Math.random() * 3,
    });
  }
}

function spawnFeatherBurst() {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.3;
    const speed = 2 + Math.random() * 2.5;
    particles.push({
      type: 'feather',
      x: bird.x, y: bird.y,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1,
      life: 0, maxLife: 800 + Math.random() * 400,
      rotation: Math.random() * Math.PI * 2,
      rotationSpeed: (Math.random() - 0.5) * 0.25,
      size: 5 + Math.random() * 3,
    });
  }
}

function spawnScorePopup() {
  particles.push({
    type: 'popup',
    x: bird.x + 22, y: bird.y - 12,
    vx: 0, vy: -0.55,
    life: 0, maxLife: 700,
    text: '+1',
  });
}

function updateParticles(dt, factor) {
  for (const p of particles) {
    p.life += dt;
    p.x += p.vx * factor;
    p.y += p.vy * factor;
    if (p.type === 'feather') {
      p.rotation += p.rotationSpeed * factor;
      p.vy += 0.05 * factor;
    } else if (p.type === 'dust') {
      p.vx *= Math.pow(0.95, factor);
    }
  }
  particles = particles.filter((p) => p.life < p.maxLife);
}

function drawParticles(ctxRef) {
  for (const p of particles) {
    const t = clamp(p.life / p.maxLife, 0, 1);
    const alpha = 1 - t;
    if (p.type === 'dust') {
      ctxRef.fillStyle = 'rgba(255,255,255,' + (alpha * 0.5).toFixed(3) + ')';
      ctxRef.beginPath();
      ctxRef.arc(p.x, p.y, p.size * (1 + t), 0, Math.PI * 2);
      ctxRef.fill();
    } else if (p.type === 'feather') {
      ctxRef.save();
      ctxRef.translate(p.x, p.y);
      ctxRef.rotate(p.rotation);
      ctxRef.fillStyle = 'rgba(30,30,32,' + alpha.toFixed(3) + ')';
      ctxRef.beginPath();
      ctxRef.ellipse(0, 0, p.size, p.size * 0.42, 0, 0, Math.PI * 2);
      ctxRef.fill();
      ctxRef.restore();
    } else if (p.type === 'popup') {
      ctxRef.save();
      ctxRef.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(3) + ')';
      ctxRef.font = 'bold 18px Arial, sans-serif';
      ctxRef.textAlign = 'center';
      ctxRef.strokeStyle = 'rgba(90,59,18,' + alpha.toFixed(3) + ')';
      ctxRef.lineWidth = 3;
      ctxRef.strokeText(p.text, p.x, p.y);
      ctxRef.fillText(p.text, p.x, p.y);
      ctxRef.restore();
    }
  }
}

/* =====================================================================
   SECTION: Medals (canvas-drawn shapes)
   ===================================================================== */
function drawStar(ctxRef, cx, cy, points, outerR, innerR, color) {
  ctxRef.save();
  ctxRef.beginPath();
  const step = Math.PI / points;
  ctxRef.moveTo(cx, cy - outerR);
  for (let i = 0; i < 2 * points; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = i * step - Math.PI / 2;
    ctxRef.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
  }
  ctxRef.closePath();
  ctxRef.fillStyle = color;
  ctxRef.fill();
  ctxRef.restore();
}

function drawMedal(ctxRef, cx, cy, radius, tier) {
  ctxRef.save();
  if (!tier) {
    ctxRef.strokeStyle = 'rgba(120,90,50,0.4)';
    ctxRef.lineWidth = 3;
    ctxRef.beginPath();
    ctxRef.arc(cx, cy, radius * 0.8, 0, Math.PI * 2);
    ctxRef.stroke();
    ctxRef.fillStyle = 'rgba(120,90,50,0.5)';
    ctxRef.font = 'bold ' + Math.floor(radius * 0.6) + 'px Arial, sans-serif';
    ctxRef.textAlign = 'center';
    ctxRef.textBaseline = 'middle';
    ctxRef.fillText('?', cx, cy);
    ctxRef.restore();
    return;
  }
  const grad = ctxRef.createRadialGradient(cx - radius * 0.3, cy - radius * 0.3, radius * 0.1, cx, cy, radius * 0.85);
  grad.addColorStop(0, tier.color1);
  grad.addColorStop(1, tier.color2);
  ctxRef.fillStyle = grad;
  ctxRef.beginPath();
  ctxRef.arc(cx, cy, radius * 0.8, 0, Math.PI * 2);
  ctxRef.fill();
  ctxRef.lineWidth = radius * 0.06;
  ctxRef.strokeStyle = 'rgba(0,0,0,0.25)';
  ctxRef.stroke();
  drawStar(ctxRef, cx, cy, 5, radius * 0.42, radius * 0.18, 'rgba(255,255,255,0.9)');
  ctxRef.fillStyle = tier.color2;
  ctxRef.beginPath();
  ctxRef.moveTo(cx - radius * 0.35, cy + radius * 0.65);
  ctxRef.lineTo(cx - radius * 0.12, cy + radius * 1.25);
  ctxRef.lineTo(cx, cy + radius * 1.0);
  ctxRef.lineTo(cx + radius * 0.12, cy + radius * 1.25);
  ctxRef.lineTo(cx + radius * 0.35, cy + radius * 0.65);
  ctxRef.closePath();
  ctxRef.fill();
  ctxRef.restore();
}

function drawMedalCanvas(tier) {
  const mc = document.getElementById('medalCanvas');
  const mctx = mc.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const size = 80;
  mc.width = Math.floor(size * dpr);
  mc.height = Math.floor(size * dpr);
  mc.style.width = size + 'px';
  mc.style.height = size + 'px';
  mctx.setTransform(1, 0, 0, 1, 0, 0);
  mctx.scale(dpr, dpr);
  mctx.clearRect(0, 0, size, size);
  drawMedal(mctx, size / 2, size / 2, size / 2 - 4, tier);
}

/* =====================================================================
   SECTION: Audio (Web Audio API only — zero audio files)
   ===================================================================== */
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      audioCtx = null;
    }
  }
  return audioCtx;
}

function resumeAudioContext() {
  const ac = getAudioCtx();
  if (ac && ac.state === 'suspended') {
    ac.resume().catch(() => {});
  }
}

function playTone(freq, duration, type, startGain, delay) {
  if (memory.muted) return;
  const ac = getAudioCtx();
  if (!ac) return;
  const t0 = ac.currentTime + (delay || 0);
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(startGain || 0.2, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start(t0);
  osc.stop(t0 + duration + 0.02);
}

function playFlapSound() {
  if (memory.muted) return;
  const ac = getAudioCtx();
  if (!ac) return;
  const t0 = ac.currentTime;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(620, t0);
  osc.frequency.exponentialRampToValueAtTime(220, t0 + 0.12);
  gain.gain.setValueAtTime(0.15, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.13);
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start(t0);
  osc.stop(t0 + 0.15);
}

function playScoreSound() {
  playTone(1200, 0.12, 'square', 0.15, 0);
}

function playDeathSound() {
  if (memory.muted) return;
  const ac = getAudioCtx();
  if (!ac) return;
  const t0 = ac.currentTime;

  const osc1 = ac.createOscillator();
  const gain1 = ac.createGain();
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(120, t0);
  gain1.gain.setValueAtTime(0.3, t0);
  gain1.gain.exponentialRampToValueAtTime(0.001, t0 + 0.3);
  osc1.connect(gain1);
  gain1.connect(ac.destination);
  osc1.start(t0);
  osc1.stop(t0 + 0.32);

  const osc2 = ac.createOscillator();
  const gain2 = ac.createGain();
  osc2.type = 'sawtooth';
  osc2.frequency.setValueAtTime(300, t0 + 0.05);
  osc2.frequency.exponentialRampToValueAtTime(80, t0 + 0.5);
  gain2.gain.setValueAtTime(0.12, t0 + 0.05);
  gain2.gain.exponentialRampToValueAtTime(0.001, t0 + 0.55);
  osc2.connect(gain2);
  gain2.connect(ac.destination);
  osc2.start(t0 + 0.05);
  osc2.stop(t0 + 0.6);
}

function playGameOverJingle() {
  playTone(392, 0.18, 'triangle', 0.15, 0);
  playTone(330, 0.18, 'triangle', 0.15, 0.18);
  playTone(262, 0.32, 'triangle', 0.15, 0.36);
}

let menuMusicTimer = null;
let menuMusicStep = 0;
const MENU_MELODY = [392, 440, 523, 440, 392, 349, 392, 523];

function startMenuMusic() {
  stopMenuMusic();
  menuMusicStep = 0;
  menuMusicTimer = setInterval(() => {
    if (!memory.muted && gameState === STATE.START) {
      playTone(MENU_MELODY[menuMusicStep % MENU_MELODY.length], 0.35, 'triangle', 0.05, 0);
    }
    menuMusicStep++;
  }, 420);
}

function stopMenuMusic() {
  if (menuMusicTimer) {
    clearInterval(menuMusicTimer);
    menuMusicTimer = null;
  }
}

/* =====================================================================
   SECTION: Game State / Scoring / Collisions
   ===================================================================== */
let gameState = STATE.START;
let score = 0;
let deathTimer = 0;
let showGameOverPanel = false;

let shakeTimeLeft = 0;
let flashFrames = 0;

function triggerScreenShake() { shakeTimeLeft = 400; }
function triggerScreenFlash() { flashFrames = 3; }

function checkCollisions() {
  const lenient = getDifficulty().HITBOX_LENIENCY;
  // Keep a minimum radius so extreme leniency can never make the bird invincible
  const r = Math.max(6, CONFIG.BIRD_SIZE * 0.38 - lenient);

  if (bird.y + r > cssHeight - CONFIG.GROUND_HEIGHT) return true;
  if (bird.y - r < 0) return true;

  for (const p of pipes) {
    const px = p.x + lenient;
    const pw = CONFIG.PIPE_WIDTH - lenient * 2;
    if (bird.x + r > px && bird.x - r < px + pw) {
      const topH = (p.gapY - p.gapHeight / 2) + lenient;
      const botY = (p.gapY + p.gapHeight / 2) - lenient;
      if (bird.y - r < topH || bird.y + r > botY) return true;
    }
  }
  return false;
}

function updateScoring() {
  for (const p of pipes) {
    if (!p.passed && (p.x + CONFIG.PIPE_WIDTH / 2) < bird.x) {
      p.passed = true;
      score++;
      spawnScorePopup();
      playScoreSound();
      updatePipeDifficulty(score);
      updateScoreDisplay();
    }
  }
}

function updateScoreDisplay() {
  document.getElementById('scoreDisplay').textContent = String(score);
}

function updateHUDVisibility() {
  const scoreEl = document.getElementById('scoreDisplay');
  const pauseBtn = document.getElementById('pauseBtn');
  scoreEl.style.display = (gameState === STATE.PLAYING || gameState === STATE.PAUSED) ? 'block' : 'none';
  pauseBtn.style.display = (gameState === STATE.PLAYING || gameState === STATE.PAUSED) ? 'flex' : 'none';
}

function startGame() {
  resetBird();
  resetPipes();
  resetParticles();
  score = 0;
  shakeTimeLeft = 0;
  flashFrames = 0;
  updateScoreDisplay();
  gameState = STATE.PLAYING;
  stopMenuMusic();
  hidePauseOverlay();
  hideGameOverPanel();
  showBirdSelect(false);
  updateHUDVisibility();
}

function killBird() {
  if (gameState !== STATE.PLAYING) return;
  gameState = STATE.DEAD;
  bird.alive = false;
  deathTimer = 0;
  showGameOverPanel = false;

  spawnFeatherBurst();
  triggerScreenFlash();
  triggerScreenShake();
  playDeathSound();

  memory.totalGames++;
  memory.totalScore += score;
  if (!memory.highScores) memory.highScores = { idiot: 0, beginner: 0, skilled: 0, expert: 0, india: 0 };
  const diffId = selectedDifficultyId || memory.difficulty || 'beginner';
  const prevBest = parseInt(memory.highScores[diffId], 10) || 0;
  if (score > prevBest) memory.highScores[diffId] = score;
  // Keep legacy overall best for display compatibility
  const overall = Math.max(
    memory.highScore || 0,
    memory.highScores.idiot || 0,
    memory.highScores.beginner || 0,
    memory.highScores.skilled || 0,
    memory.highScores.expert || 0,
    memory.highScores.india || 0
  );
  memory.highScore = overall;
  const medal = getMedalForScore(score);
  if (medal && medalRank(medal.name) > medalRank(memory.bestMedal)) {
    memory.bestMedal = medal.name;
  }
  saveMemory();
  refreshBirdOptionLocks();
  updateHUDVisibility();
}

function updateDead(dt, factor) {
  deathTimer += dt;
  const floorY = cssHeight - CONFIG.GROUND_HEIGHT - CONFIG.BIRD_SIZE * 0.3;
  if (bird.y < floorY) {
    bird.vy += getDifficulty().GRAVITY * factor * 1.15;
    bird.y += bird.vy * factor;
    bird.rotation += 0.14 * factor;
  } else {
    bird.y = floorY;
    if (!showGameOverPanel) {
      showGameOverPanel = true;
      playGameOverJingle();
      showGameOverPanelUI();
    }
  }
  updateParticles(dt, factor);
}

function showGameOverPanelUI() {
  document.getElementById('finalScore').textContent = String(score);
  document.getElementById('finalBest').textContent = String(getDiffHighScore());
  document.getElementById('finalGames').textContent = String(memory.totalGames);
  document.getElementById('finalTotal').textContent = String(memory.totalScore);

  const medal = getMedalForScore(score);
  drawMedalCanvas(medal);
  document.getElementById('medalLabel').textContent = medal ? (medal.name.toUpperCase() + ' MEDAL') : 'NO MEDAL YET';

  const panel = document.getElementById('gameOverPanel');
  panel.classList.remove('hidden');
  panel.classList.remove('show');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => panel.classList.add('show'));
  });
  updateHUDVisibility();
  refreshBirdOptionLocks();
  // If this personal-best run crossed an unlock threshold, celebrate on the medal line
  if (score === getDiffHighScore()) {
    const unlockedNow = BIRDS.filter((b) => {
      const req = getUnlockRequirement(b.id);
      return req != null && req > 0 && score >= req && (score - req) < 5;
    });
    if (unlockedNow.length) {
      const medalLabel = document.getElementById('medalLabel');
      if (medalLabel) {
        medalLabel.textContent = 'NEW POKéMON: ' + unlockedNow.map((b) => b.name).join(', ');
      }
    }
  }
}

function hideGameOverPanel() {
  const panel = document.getElementById('gameOverPanel');
  panel.classList.remove('show');
  panel.classList.add('hidden');
}

function pauseGame() {
  if (gameState !== STATE.PLAYING) return;
  gameState = STATE.PAUSED;
  document.getElementById('pauseOverlay').classList.remove('hidden');
  updateHUDVisibility();
}

function resumeGame() {
  if (gameState !== STATE.PAUSED) return;
  gameState = STATE.PLAYING;
  hidePauseOverlay();
  updateHUDVisibility();
}

function hidePauseOverlay() {
  document.getElementById('pauseOverlay').classList.add('hidden');
}

function goToMenu() {
  gameState = STATE.START;
  hideGameOverPanel();
  hidePauseOverlay();
  showBirdSelect(true);
  syncBirdSelectUI();
  updateHUDVisibility();
  startMenuMusic();
}



/* =====================================================================
   SECTION: Bird Unlock Logic (per difficulty)
   ===================================================================== */
function getDiffHighScore(diffId) {
  const id = diffId || selectedDifficultyId || memory.difficulty || 'beginner';
  const map = memory.highScores || {};
  return parseInt(map[id], 10) || 0;
}

function getUnlockRequirement(birdId, diffId) {
  const id = diffId || selectedDifficultyId || 'beginner';
  const table = DIFFICULTY_UNLOCKS[id] || DIFFICULTY_UNLOCKS.beginner;
  return table[birdId];
}

function isBirdMasked(birdId, diffId) {
  return getUnlockRequirement(birdId, diffId) === null;
}

function isBirdUnlocked(birdId, diffId) {
  const req = getUnlockRequirement(birdId, diffId);
  if (req === null || typeof req === 'undefined') return false;
  return getDiffHighScore(diffId) >= req;
}

function getBirdDef(id) {
  return BIRDS.find((b) => b.id === id) || BIRDS[0];
}

function countUnlockedBirds() {
  return BIRDS.filter((b) => isBirdUnlocked(b.id)).length;
}

function countAvailableBirds() {
  return BIRDS.filter((b) => !isBirdMasked(b.id)).length;
}

function nextUnlockTarget() {
  const best = getDiffHighScore();
  let bestNext = null;
  for (const b of BIRDS) {
    const req = getUnlockRequirement(b.id);
    if (req === null) continue;
    if (req > best && (bestNext === null || req < bestNext.unlock)) {
      bestNext = { name: b.name, unlock: req };
    }
  }
  return bestNext;
}

function updateUnlockProgressUI() {
  const el = document.getElementById('unlockProgress');
  if (!el) return;
  const unlocked = countUnlockedBirds();
  const available = countAvailableBirds();
  const next = nextUnlockTarget();
  const best = getDiffHighScore();
  const diffLabel = getDifficulty().label.replace('Difficulty: ', '');
  if (!next) {
    el.textContent = diffLabel + ' best: ' + best + ' • ' + unlocked + '/' + available + ' available unlocked';
  } else {
    el.textContent = diffLabel + ' best: ' + best + ' • Next: ' + next.name + ' at ' + next.unlock;
  }
}

function updateBirdDescUI(id) {
  const def = getBirdDef(id);
  if (!def) return;
  inspectedBirdId = def.id;
  const masked = isBirdMasked(def.id);
  const unlocked = isBirdUnlocked(def.id);
  const req = getUnlockRequirement(def.id);
  const titleEl = document.getElementById('birdDescTitle');
  const unlockEl = document.getElementById('birdDescUnlock');
  const textEl = document.getElementById('birdDescText');
  unlockEl.classList.remove('locked', 'unlocked');

  if (masked) {
    titleEl.textContent = '???';
    unlockEl.textContent = 'HIDDEN ON THIS DIFFICULTY — clear a harder mode to chase it';
    unlockEl.classList.add('locked');
    textEl.textContent = 'This Pokémon stays mysterious here. Switch to a higher difficulty to make it unlockable.';
    return;
  }

  titleEl.textContent = def.name;
  if (unlocked) {
    unlockEl.textContent = req > 0 ? ('UNLOCKED (reached ' + req + '+ on this difficulty)') : 'STARTER — AVAILABLE';
    unlockEl.classList.add('unlocked');
  } else {
    unlockEl.textContent = 'LOCKED — score ' + req + '+ on ' + getDifficulty().label.replace('Difficulty: ', '');
    unlockEl.classList.add('locked');
  }
  textEl.textContent = def.desc;
}

function refreshBirdOptionLocks() {
  document.querySelectorAll('.birdOption').forEach((btn) => {
    const id = btn.getAttribute('data-bird');
    const unlocked = isBirdUnlocked(id);
    const masked = isBirdMasked(id);
    btn.classList.toggle('masked', masked);
    btn.classList.toggle('locked', !unlocked);
    btn.classList.toggle('selected', id === selectedBirdId && unlocked);
    const req = getUnlockRequirement(id);
    if (masked) {
      btn.setAttribute('data-lock', '');
      btn.setAttribute('aria-label', 'Hidden Pokémon');
    } else if (!unlocked && req != null) {
      btn.setAttribute('data-lock', '🔒' + req);
      btn.setAttribute('aria-label', (BIRD_LABELS[id] || id) + ' locked');
    } else {
      btn.setAttribute('data-lock', '');
      btn.setAttribute('aria-label', BIRD_LABELS[id] || id);
    }
  });
  // If current selection invalid for this difficulty, fall back to Pikachu
  if (!isBirdUnlocked(selectedBirdId)) {
    selectedBirdId = 'pikachu';
    memory.selectedBird = 'pikachu';
    saveMemory();
    document.querySelectorAll('.birdOption').forEach((btn) => {
      btn.classList.toggle('selected', btn.getAttribute('data-bird') === 'pikachu');
    });
  }
  updateUnlockProgressUI();
}

/* =====================================================================
   SECTION: Bird Selection
   ===================================================================== */
function applyBirdSelection(id) {
  if (!BIRD_IMAGES[id]) return;
  updateBirdDescUI(id);
  if (!isBirdUnlocked(id)) {
    // Locked birds are educational only — cannot equip yet
    refreshBirdOptionLocks();
    return false;
  }
  selectedBirdId = id;
  memory.selectedBird = id;
  saveMemory();
  refreshBirdOptionLocks();
  return true;
}

function syncBirdSelectUI() {
  let id = memory.selectedBird || selectedBirdId || 'pikachu';
  if (!isBirdUnlocked(id)) id = 'pikachu';
  selectedBirdId = id;
  memory.selectedBird = id;
  updateBirdDescUI(id);
  refreshBirdOptionLocks();
}

function showBirdSelect(show) {
  const el = document.getElementById('birdSelect');
  if (!el) return;
  el.classList.toggle('hidden', !show);
}

/* =====================================================================
   SECTION: Controls
   ===================================================================== */
function onTap() {
  resumeAudioContext();
  if (gameState === STATE.START) {
    startGame();
  } else if (gameState === STATE.PLAYING) {
    jump();
  }
  // DEAD and PAUSED states are advanced only via explicit buttons.
}

function isInteractiveTarget(target) {
  return !!(target && target.closest && (
    target.closest('button') ||
    target.closest('#birdSelect') ||
    target.closest('#difficultySelect')
  ));
}

function onGlobalPointerDown(e) {
  if (isInteractiveTarget(e.target)) return; // let the button's own click handler run
  e.preventDefault();
  onTap();
}

document.addEventListener('touchstart', onGlobalPointerDown, { passive: false });
document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
document.addEventListener('mousedown', onGlobalPointerDown);

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    onTap();
  }
});

document.getElementById('muteBtn').addEventListener('click', () => {
  memory.muted = !memory.muted;
  updateMuteButton();
  saveMemory();
});

document.getElementById('pauseBtn').addEventListener('click', pauseGame);
document.getElementById('resumeBtn').addEventListener('click', resumeGame);
document.getElementById('retryBtn').addEventListener('click', () => {
  resumeAudioContext();
  startGame();
});
document.getElementById('menuBtn').addEventListener('click', goToMenu);
function updateMuteButton() {
  document.getElementById('muteBtn').textContent = memory.muted ? '🔇' : '🔊';
}

window.addEventListener('orientationchange', () => {
  if (gameState === STATE.PLAYING) pauseGame();
  setTimeout(resizeCanvas, 250);
});

/* =====================================================================
   SECTION: Start Screen Rendering
   ===================================================================== */
function drawStartScreen(ctxRef, now) {
  ctxRef.save();
  ctxRef.textAlign = 'center';

  ctxRef.font = 'bold 42px "Arial Black", Arial, sans-serif';
  ctxRef.lineWidth = 7;
  ctxRef.strokeStyle = '#5a3b12';
  ctxRef.fillStyle = '#fff9e0';
  const titleY = cssHeight * 0.22;
  ctxRef.strokeText(GAME_NAME.toUpperCase(), cssWidth / 2, titleY);
  ctxRef.fillText(GAME_NAME.toUpperCase(), cssWidth / 2, titleY);

  ctxRef.font = 'bold 17px Arial, sans-serif';
  ctxRef.fillStyle = '#5a3b12';
  ctxRef.fillText(getDifficulty().label.replace('Difficulty: ', '').toUpperCase() + ' BEST: ' + getDiffHighScore(), cssWidth / 2, titleY + 32);

  const bobY = Math.sin(now / 300) * 8;
  const flapAngle = Math.sin(now / 80) * 0.5;
  const previewY = cssHeight * 0.28;
  drawBird(ctxRef, cssWidth / 2, previewY + bobY, CONFIG.BIRD_SIZE * 1.1, flapAngle);

  ctxRef.font = 'bold 12px Arial, sans-serif';
  ctxRef.fillStyle = '#5a3b12';
  const birdName = (BIRD_LABELS[selectedBirdId] || 'Bird').toUpperCase();
  ctxRef.fillText(birdName, cssWidth / 2, previewY + CONFIG.BIRD_SIZE * 0.78);
  ctxRef.font = 'bold 11px Arial, sans-serif';
  ctxRef.fillText(getDifficulty().label, cssWidth / 2, previewY + CONFIG.BIRD_SIZE * 0.78 + 16);

  const pulse = 0.55 + 0.45 * Math.sin(now / 250);
  ctxRef.globalAlpha = pulse;
  ctxRef.fillStyle = '#ffffff';
  ctxRef.font = 'bold 18px Arial, sans-serif';
  ctxRef.strokeStyle = '#5a3b12';
  ctxRef.lineWidth = 4;
  ctxRef.strokeText('TAP TO START', cssWidth / 2, cssHeight * 0.40);
  ctxRef.fillText('TAP TO START', cssWidth / 2, cssHeight * 0.40);
  ctxRef.globalAlpha = 1;

  ctxRef.restore();
}

/* =====================================================================
   SECTION: Game Loop
   ===================================================================== */
function update(dt) {
  const factor = dt / CONFIG.FRAME_MS;

  if (gameState === STATE.PAUSED) return;

  updateClouds(factor);
  updateGround(factor);
  if (shakeTimeLeft > 0) shakeTimeLeft = Math.max(0, shakeTimeLeft - dt);

  if (gameState === STATE.PLAYING) {
    updateBird(dt);
    updatePipes(dt, factor);
    updateScoring();
    updateParticles(dt, factor);
    if (checkCollisions()) killBird();
  } else if (gameState === STATE.DEAD) {
    updateDead(dt, factor);
  } else if (gameState === STATE.START) {
    updateParticles(dt, factor);
  }
}

function render() {
  ctx.clearRect(0, 0, cssWidth, cssHeight);

  let shakeX = 0, shakeY = 0;
  if (shakeTimeLeft > 0) {
    const t = Date.now();
    const wane = shakeTimeLeft / 400;
    shakeX = Math.sin(t / 20) * 4 * wane;
    shakeY = Math.cos(t / 25) * 4 * wane;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawSky(ctx);
  drawClouds(ctx);
  drawPipesAll(ctx);
  drawGround(ctx);
  drawParticles(ctx);

  const flapAngle = Math.sin(Date.now() / 80) * (gameState === STATE.PLAYING ? 0.5 : 0.35);
  if (gameState !== STATE.START) {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rotation);
    drawBird(ctx, 0, 0, CONFIG.BIRD_SIZE, flapAngle);
    ctx.restore();
  }

  drawVignette(ctx);
  ctx.restore();

  if (gameState === STATE.START) {
    drawStartScreen(ctx, Date.now());
  }

  if (flashFrames > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(0, 0, cssWidth, cssHeight);
    flashFrames--;
  }
}

let lastTime = performance.now();
function loop(now) {
  let dt = now - lastTime;
  lastTime = now;
  dt = Math.min(dt, CONFIG.MAX_DT);
  update(dt);
  render();
  requestAnimationFrame(loop);
}

/* =====================================================================
   SECTION: Init
   ===================================================================== */
function init() {
  loadMemory();
  selectedBirdId = (memory.selectedBird && isBirdUnlocked(memory.selectedBird)) ? memory.selectedBird : 'pikachu';
  updateMuteButton();
  document.querySelectorAll('.birdOption').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      resumeAudioContext();
      applyBirdSelection(btn.getAttribute('data-bird'));
    });
  });
  syncDifficultyUI();
  document.querySelectorAll('.diffBtn').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      resumeAudioContext();
      applyDifficultySelection(btn.getAttribute('data-diff'));
    });
  });
  syncBirdSelectUI();
  showBirdSelect(true);
  resizeCanvas();
  initClouds();
  resetBird();
  resetPipes();
  resetParticles();
  updateScoreDisplay();
  updateHUDVisibility();
  startMenuMusic();
  requestAnimationFrame(loop);
}

init();
</script>
